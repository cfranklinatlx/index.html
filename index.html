<!DOCTYPE html>
<html>
<head>
    <title>RIP List Form</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; margin-right: 10px; }
        .form-block { border: 1px solid #ccc; padding: 15px; margin: 20px 0; background: #f9f9f9; border-radius: 5px; }
        .form-block h4 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .remove-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .tile-row { margin-bottom: 8px; }
        .button-group { margin: 20px 0; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>

<h2>RIP List Form</h2>

<!-- Static fields -->
<div class="form-group">
    <label>Ripped by:</label>
    <input type="text" id="rippedBy">
</div>
<div class="form-group">
    <label>Printer:</label>
    <select id="printer">
        <option value="5R1">5R1</option>
        <option value="5R2">5R2</option>
        <option value="5R3">5R3</option>
        <option value="5R4">5R4</option>
        <option value="FabriVu">FabriVu</option>
        <option value="Kudu 1">Kudu 1</option>
        <option value="Kudu 2">Kudu 2</option>
        <option value="Kudu 3">Kudu 3</option>
    </select>
</div>
<div class="form-group">
    <label>Color Match:</label>
    <select id="colorMatch">
        <option value="Laser">Laser</option>
        <option value="Mini">Mini</option>
        <option value="Pleasing">Pleasing</option>
    </select>
</div>

<!-- PDF File Upload -->
<div class="form-group">
    <label>Upload Job Ticket PDF:</label>
    <input type="file" id="jobTicketPdf" accept=".pdf,application/pdf" required>
</div>

<hr>

<!-- Container where form blocks will be added -->
<div id="formsContainer"></div>

<!-- "Add Form" button at the bottom -->
<div class="button-group">
    <button id="addAnotherFormBtn">➕ Add Another Form</button>
</div>

<hr>

<button id="submitBtn">Submit to n8n</button>

<script>
    // ========== CONFIGURATION ==========
    const n8nWebhookUrl = 'https://cfranklinatlx.app.n8n.cloud/webhook/106d0183-5d4a-4655-abe7-5aa10c4fad59';
    
    // Set default Ripped By based on time (6am-6pm = GH, else JD)
    const currentHour = new Date().getHours();
    const defaultRippedBy = (currentHour >= 6 && currentHour < 18) ? 'GH' : 'JD';
    document.getElementById('rippedBy').value = defaultRippedBy;
    
    // ========== DYNAMIC FORM BLOCK MANAGEMENT ==========
    const formsContainer = document.getElementById('formsContainer');
    let formCounter = 0;
    
    // Function to create a new form block
    function createFormBlock() {
        formCounter++;
        const blockId = `formBlock_${formCounter}`;
        const blockDiv = document.createElement('div');
        blockDiv.className = 'form-block';
        blockDiv.id = blockId;
        
        const headerHtml = `
            <h4>
                <span>Form ${formCounter}</span>
                <button class="remove-btn" onclick="removeFormBlock('${blockId}')">Remove</button>
            </h4>
            <div class="form-group">
                <label>Form Type:</label>
                <select class="formTypeSelect" data-block-id="${blockId}">
                    <option value="">-- Select --</option>
                    <option value="default" selected>Default</option>
                    <option value="singleNest">Single-File Nest</option>
                    <option value="multiNest">Multi-File Nest</option>
                    <option value="spectacular">Spectacular</option>
                </select>
            </div>
            <div class="dynamicFieldsArea" id="fields_${blockId}"></div>
        `;
        blockDiv.innerHTML = headerHtml;
        formsContainer.appendChild(blockDiv);
        
        const typeSelect = blockDiv.querySelector('.formTypeSelect');
        const fieldsArea = document.getElementById(`fields_${blockId}`);
        
        function generateFields(type) {
            let html = '';
            if (type === 'default') {
                html = `
                    <label>Form #:</label> <input type="text" class="defaultFormNum" placeholder="e.g., 1"><br>
                    <label>Tile #:</label> <input type="text" class="defaultTileNum" placeholder="e.g., 3"><br>
                    <label>File Name:</label> <input type="text" class="defaultFileName" placeholder="e.g., my_file.pdf"><br>
                `;
            } else if (type === 'singleNest') {
                html = `
                    <label>Form #:</label> <input type="text" class="singleFormNum"><br>
                    <label>Nest Qty:</label> <input type="text" class="singleNestQty"><br>
                    <label>File Name:</label> <input type="text" class="singleFileName"><br>
                `;
            } else if (type === 'multiNest') {
                html = `
                    <label>Form Quantity:</label> <input type="number" class="multiFormQty" min="1" value="1"><br><br>
                    <div class="multiFormContainer"></div>
                `;
                setTimeout(() => {
                    const container = blockDiv.querySelector('.multiFormContainer');
                    const qtyInput = blockDiv.querySelector('.multiFormQty');
                    function updateMultiFields() {
                        const qty = parseInt(qtyInput.value) || 1;
                        let fieldsHtml = '';
                        for (let i = 1; i <= qty; i++) {
                            fieldsHtml += `<label>Form #${i}:</label> <input type="text" class="multiFormNum" data-index="${i}"><br>`;
                            fieldsHtml += `<label>File Name #${i}:</label> <input type="text" class="multiFileName" data-index="${i}"><br>`;
                            fieldsHtml += `<label>Amount in Nest #${i}:</label> <input type="text" class="multiNestAmount" data-index="${i}" placeholder="e.g., 5"><br><br>`;
                        }
                        container.innerHTML = fieldsHtml;
                    }
                    qtyInput.addEventListener('input', updateMultiFields);
                    updateMultiFields();
                }, 10);
            } else if (type === 'spectacular') {
                html = `
                    <label>Form #:</label> <input type="text" class="specFormNum"><br>
                    <label>File Name:</label> <input type="text" class="specFileName"><br>
                    <label>Row Count:</label> <input type="number" class="specRowCount" min="1" value="1"><br><br>
                    <div class="specRowContainer"></div>
                `;
                setTimeout(() => {
                    const container = blockDiv.querySelector('.specRowContainer');
                    const rowCountInput = blockDiv.querySelector('.specRowCount');
                    
                    function updateSpecRows() {
                        const rows = parseInt(rowCountInput.value) || 1;
                        let rowsHtml = '';
                        for (let i = 1; i <= rows; i++) {
                            rowsHtml += `<div class="tile-row">`;
                            rowsHtml += `<label># of tiles in Row ${i}:</label> <input type="text" class="specTileCount" data-row="${i}" placeholder="e.g., 5"><br>`;
                            rowsHtml += `</div>`;
                        }
                        container.innerHTML = rowsHtml;
                        
                        const tileInputs = container.querySelectorAll('.specTileCount');
                        if (tileInputs.length > 0) {
                            tileInputs[0].addEventListener('input', function(e) {
                                const firstVal = e.target.value;
                                for (let j = 1; j < tileInputs.length; j++) {
                                    tileInputs[j].value = firstVal;
                                }
                            });
                        }
                    }
                    
                    rowCountInput.addEventListener('input', updateSpecRows);
                    updateSpecRows();
                }, 10);
            }
            fieldsArea.innerHTML = html;
        }
        
        generateFields('default');
        typeSelect.addEventListener('change', (e) => generateFields(e.target.value));
        return blockDiv;
    }
    
    window.removeFormBlock = function(blockId) {
        const block = document.getElementById(blockId);
        if (block) block.remove();
    };
    
    // Add initial form block
    createFormBlock();
    
    // Single "Add Form" button
    document.getElementById('addAnotherFormBtn').addEventListener('click', createFormBlock);
    
    // ========== SUBMIT LOGIC WITH FILE UPLOAD ==========
    document.getElementById('submitBtn').addEventListener('click', async () => {
        const rippedBy = document.getElementById('rippedBy').value;
        const printer = document.getElementById('printer').value;
        const colorMatch = document.getElementById('colorMatch').value;
        const fileInput = document.getElementById('jobTicketPdf');
        
        // Validate file selection
        if (!fileInput.files.length) {
            alert('Please select a PDF file to upload.');
            return;
        }
        
        // Gather all form blocks
        const forms = [];
        const formBlocks = document.querySelectorAll('.form-block');
        
        formBlocks.forEach((block, index) => {
            const typeSelect = block.querySelector('.formTypeSelect');
            const type = typeSelect.value;
            const formData = { type, order: index + 1 };
            
            if (type === 'default') {
                formData.formNum = block.querySelector('.defaultFormNum')?.value || '';
                formData.tileNum = block.querySelector('.defaultTileNum')?.value || '';
                formData.fileName = block.querySelector('.defaultFileName')?.value || '';
            } else if (type === 'singleNest') {
                formData.formNum = block.querySelector('.singleFormNum')?.value || '';
                formData.nestQty = block.querySelector('.singleNestQty')?.value || '';
                formData.fileName = block.querySelector('.singleFileName')?.value || '';
            } else if (type === 'multiNest') {
                const multiForms = [];
                block.querySelectorAll('.multiFormNum').forEach(input => {
                    const idx = input.dataset.index;
                    const fileName = block.querySelector(`.multiFileName[data-index="${idx}"]`)?.value || '';
                    const nestAmount = block.querySelector(`.multiNestAmount[data-index="${idx}"]`)?.value || '';
                    multiForms.push({ formNum: input.value, fileName, nestAmount });
                });
                formData.forms = multiForms;
            } else if (type === 'spectacular') {
                formData.formNum = block.querySelector('.specFormNum')?.value || '';
                formData.fileName = block.querySelector('.specFileName')?.value || '';
                const tiles = [];
                block.querySelectorAll('.specTileCount').forEach(input => {
                    tiles.push(input.value);
                });
                formData.tilesPerRow = tiles;
            }
            
            forms.push(formData);
        });
        
        // Build FormData payload (multipart/form-data)
        const formDataPayload = new FormData();
        formDataPayload.append('rippedBy', rippedBy);
        formDataPayload.append('printer', printer);
        formDataPayload.append('colorMatch', colorMatch);
        formDataPayload.append('forms', JSON.stringify(forms));
        formDataPayload.append('jobTicketPdf', fileInput.files[0]);
        
        // Send to n8n Webhook
        try {
            const response = await fetch(n8nWebhookUrl, {
                method: 'POST',
                body: formDataPayload
            });
            if (response.ok) {
                alert('Form submitted successfully!');
            } else {
                alert('Submission failed. Status: ' + response.status);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Network error. Check console for details.');
        }
    });
</script>
</body>
</html>
