<!DOCTYPE html>
<html>
<head>
    <title>RIP List Form</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; margin-right: 10px; }
        .form-block { 
            border: 2px solid #ccc; 
            padding: 15px; 
            margin: 20px 0; 
            background: #f9f9f9; 
            border-radius: 5px;
            transition: border-color 0.2s;
            position: relative;
        }
        .form-block.drag-over { border-color: #007bff; border-style: dashed; background: #eef6ff; }
        .form-block h4 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .remove-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .tile-row { margin-bottom: 8px; }
        .button-group { margin: 20px 0; }
        hr { margin: 20px 0; }
        .drop-zone-left {
            position: absolute;
            left: -30px;
            top: 0;
            width: 20px;
            height: 100%;
            background: transparent;
            z-index: 10;
        }

        /* Submission overlay styles */
        #submissionOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .submission-card {
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .summary { text-align: left; margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .summary-item { margin: 8px 0; }
        .download-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .download-link:hover { background: #218838; }
        .error-message { color: #dc3545; margin-top: 15px; }
    </style>
</head>
<body>

<h2>RIP List Form</h2>

<!-- Static fields -->
<div class="form-group">
    <label>Ripped by:</label>
    <input type="text" id="rippedBy">
</div>
<div class="form-group">
    <label>Printer:</label>
    <select id="printer">
        <option value="5R1">5R1</option>
        <option value="5R2">5R2</option>
        <option value="5R3">5R3</option>
        <option value="5R4">5R4</option>
        <option value="FabriVu">FabriVu</option>
        <option value="Kudu 1">Kudu 1</option>
        <option value="Kudu 2">Kudu 2</option>
        <option value="Kudu 3">Kudu 3</option>
    </select>
</div>
<div class="form-group">
    <label>Color Match:</label>
    <select id="colorMatch">
        <option value="Laser">Laser</option>
        <option value="Mini">Mini</option>
        <option value="Pleasing">Pleasing</option>
    </select>
</div>

<!-- PDF File Upload -->
<div class="form-group">
    <label>Upload Job Ticket PDF:</label>
    <input type="file" id="jobTicketPdf" accept=".pdf,application/pdf" required>
</div>

<hr>

<!-- Container where form blocks will be added -->
<div id="formsContainer"></div>

<!-- "Add Form" button at the bottom -->
<div class="button-group">
    <button id="addAnotherFormBtn">➕ Add Another Form</button>
</div>

<hr>

<button id="submitBtn">Submit to n8n</button>

<!-- Submission Overlay -->
<div id="submissionOverlay">
    <div class="submission-card">
        <h3 id="overlayTitle">Processing Your RIP List</h3>
        <div id="summaryContent" class="summary"></div>
        <div id="spinner" class="spinner"></div>
        <p id="statusMessage">Waiting for RIP List...</p>
        <div id="downloadContainer"></div>
        <div id="errorContainer" class="error-message"></div>
    </div>
</div>

<script>
    // ========== CONFIGURATION ==========
    const n8nWebhookUrl = 'https://cfranklinatlx.app.n8n.cloud/webhook/106d0183-5d4a-4655-abe7-5aa10c4fad59';
    
    // Set default Ripped By based on time (6am-6pm = GH, else JD)
    const currentHour = new Date().getHours();
    const defaultRippedBy = (currentHour >= 6 && currentHour < 18) ? 'GH' : 'JD';
    document.getElementById('rippedBy').value = defaultRippedBy;
    
    // ========== HELPER: Clean filename (remove .pdf) ==========
    function cleanFileName(fileName) {
        return fileName.replace(/\.pdf$/i, '');
    }
    
    // ========== DRAG & DROP: Global listeners ==========
    document.body.addEventListener('dragover', (e) => e.preventDefault());
    document.body.addEventListener('drop', (e) => e.preventDefault());
    
    // ========== DYNAMIC FORM BLOCK MANAGEMENT ==========
    const formsContainer = document.getElementById('formsContainer');
    let formCounter = 0;
    
    // Function to populate a form block with file names
    function populateFormBlock(block, files, replaceAll = true) {
        const typeSelect = block.querySelector('.formTypeSelect');
        const type = typeSelect.value;
        const fileNames = files.map(f => cleanFileName(f.name));
        
        if (type === 'default') {
            const fileNameInput = block.querySelector('.defaultFileName');
            if (fileNameInput) {
                fileNameInput.value = replaceAll ? fileNames[0] || '' : (fileNameInput.value ? fileNameInput.value + ', ' + fileNames.join(', ') : fileNames.join(', '));
            }
        } else if (type === 'singleNest') {
            const fileNameInput = block.querySelector('.singleFileName');
            if (fileNameInput) {
                fileNameInput.value = replaceAll ? fileNames[0] || '' : (fileNameInput.value ? fileNameInput.value + ', ' + fileNames.join(', ') : fileNames.join(', '));
            }
        } else if (type === 'multiNest') {
            // For multiNest, each file gets its own row
            const container = block.querySelector('.multiFormContainer');
            const qtyInput = block.querySelector('.multiFormQty');
            if (container && qtyInput) {
                const newQty = replaceAll ? files.length : parseInt(qtyInput.value) + files.length;
                qtyInput.value = newQty;
                qtyInput.dispatchEvent(new Event('input'));
                // Wait for DOM update
                setTimeout(() => {
                    const fileNameInputs = block.querySelectorAll('.multiFileName');
                    const startIdx = replaceAll ? 0 : fileNameInputs.length - files.length;
                    files.forEach((file, i) => {
                        const idx = startIdx + i;
                        if (fileNameInputs[idx]) {
                            fileNameInputs[idx].value = cleanFileName(file.name);
                        }
                    });
                }, 50);
            }
        } else if (type === 'spectacular') {
            const fileNameInput = block.querySelector('.specFileName');
            if (fileNameInput) {
                fileNameInput.value = replaceAll ? fileNames[0] || '' : (fileNameInput.value ? fileNameInput.value + ', ' + fileNames.join(', ') : fileNames.join(', '));
            }
        }
    }
    
    function createFormBlock() {
        formCounter++;
        const blockId = `formBlock_${formCounter}`;
        const blockDiv = document.createElement('div');
        blockDiv.className = 'form-block';
        blockDiv.id = blockId;
        blockDiv.setAttribute('data-form-num', formCounter);
        
        // Left drop zone (creates new forms)
        const leftDropZone = document.createElement('div');
        leftDropZone.className = 'drop-zone-left';
        leftDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
        leftDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length === 0) return;
            
            // Create a new form block for EACH file
            files.forEach(file => {
                const newBlock = createFormBlock();
                populateFormBlock(newBlock, [file], true);
            });
        });
        blockDiv.appendChild(leftDropZone);
        
        // Drag over / drop on the block itself
        blockDiv.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            blockDiv.classList.add('drag-over');
        });
        blockDiv.addEventListener('dragleave', () => {
            blockDiv.classList.remove('drag-over');
        });
        blockDiv.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            blockDiv.classList.remove('drag-over');
            
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length === 0) return;
            
            populateFormBlock(blockDiv, files, true);
        });
        
        const headerHtml = `
            <h4>
                <span>Form ${formCounter}</span>
                <button class="remove-btn" onclick="removeFormBlock('${blockId}')">Remove</button>
            </h4>
            <div class="form-group">
                <label>Form Type:</label>
                <select class="formTypeSelect" data-block-id="${blockId}">
                    <option value="">-- Select --</option>
                    <option value="default" selected>Default</option>
                    <option value="singleNest">Single-File Nest</option>
                    <option value="multiNest">Multi-File Nest</option>
                    <option value="spectacular">Spectacular</option>
                </select>
            </div>
            <div class="dynamicFieldsArea" id="fields_${blockId}"></div>
        `;
        blockDiv.insertAdjacentHTML('beforeend', headerHtml);
        formsContainer.appendChild(blockDiv);
        
        const typeSelect = blockDiv.querySelector('.formTypeSelect');
        const fieldsArea = document.getElementById(`fields_${blockId}`);
        
        function generateFields(type) {
            let html = '';
            if (type === 'default') {
                html = `
                    <label>File Name:</label> <input type="text" class="defaultFileName" placeholder="e.g., my_file"><br>
                    <label>Tile #:</label> <input type="text" class="defaultTileNum" placeholder="e.g., 3"><br>
                `;
            } else if (type === 'singleNest') {
                html = `
                    <label>File Name:</label> <input type="text" class="singleFileName"><br>
                    <label>Nest Qty:</label> <input type="text" class="singleNestQty"><br>
                `;
            } else if (type === 'multiNest') {
                html = `
                    <label>Form Quantity:</label> <input type="number" class="multiFormQty" min="1" value="1"><br><br>
                    <div class="multiFormContainer"></div>
                `;
                setTimeout(() => {
                    const container = blockDiv.querySelector('.multiFormContainer');
                    const qtyInput = blockDiv.querySelector('.multiFormQty');
                    function updateMultiFields() {
                        const qty = parseInt(qtyInput.value) || 1;
                        let fieldsHtml = '';
                        for (let i = 1; i <= qty; i++) {
                            fieldsHtml += `<label>File Name #${i}:</label> <input type="text" class="multiFileName" data-index="${i}"><br>`;
                            fieldsHtml += `<label>Amount in Nest #${i}:</label> <input type="text" class="multiNestAmount" data-index="${i}" placeholder="e.g., 5"><br><br>`;
                        }
                        container.innerHTML = fieldsHtml;
                    }
                    qtyInput.addEventListener('input', updateMultiFields);
                    updateMultiFields();
                }, 10);
            } else if (type === 'spectacular') {
                html = `
                    <label>File Name:</label> <input type="text" class="specFileName"><br>
                    <label>Row Count:</label> <input type="number" class="specRowCount" min="1" value="1"><br><br>
                    <div class="specRowContainer"></div>
                `;
                setTimeout(() => {
                    const container = blockDiv.querySelector('.specRowContainer');
                    const rowCountInput = blockDiv.querySelector('.specRowCount');
                    
                    function updateSpecRows() {
                        const rows = parseInt(rowCountInput.value) || 1;
                        let rowsHtml = '';
                        for (let i = 1; i <= rows; i++) {
                            rowsHtml += `<div class="tile-row">`;
                            rowsHtml += `<label># of tiles in Row ${i}:</label> <input type="text" class="specTileCount" data-row="${i}" placeholder="e.g., 5"><br>`;
                            rowsHtml += `</div>`;
                        }
                        container.innerHTML = rowsHtml;
                        
                        const tileInputs = container.querySelectorAll('.specTileCount');
                        if (tileInputs.length > 0) {
                            tileInputs[0].addEventListener('input', function(e) {
                                const firstVal = e.target.value;
                                for (let j = 1; j < tileInputs.length; j++) {
                                    tileInputs[j].value = firstVal;
                                }
                            });
                        }
                    }
                    
                    rowCountInput.addEventListener('input', updateSpecRows);
                    updateSpecRows();
                }, 10);
            }
            fieldsArea.innerHTML = html;
        }
        
        generateFields('default');
        typeSelect.addEventListener('change', (e) => generateFields(e.target.value));
        return blockDiv;
    }
    
    window.removeFormBlock = function(blockId) {
        const block = document.getElementById(blockId);
        if (block) block.remove();
    };
    
    createFormBlock();
    document.getElementById('addAnotherFormBtn').addEventListener('click', createFormBlock);
    
    // ========== SUBMIT LOGIC WITH OVERLAY (unchanged) ==========
    const overlay = document.getElementById('submissionOverlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const summaryContent = document.getElementById('summaryContent');
    const spinner = document.getElementById('spinner');
    const statusMessage = document.getElementById('statusMessage');
    const downloadContainer = document.getElementById('downloadContainer');
    const errorContainer = document.getElementById('errorContainer');

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const rippedBy = document.getElementById('rippedBy').value;
        const printer = document.getElementById('printer').value;
        const colorMatch = document.getElementById('colorMatch').value;
        const fileInput = document.getElementById('jobTicketPdf');
        
        if (!fileInput.files.length) {
            alert('Please select a PDF file to upload.');
            return;
        }
        
        const forms = [];
        const formBlocks = document.querySelectorAll('.form-block');
        
        formBlocks.forEach((block, index) => {
            const typeSelect = block.querySelector('.formTypeSelect');
            const type = typeSelect.value;
            const formData = { type, order: index + 1, formNum: block.querySelector('h4 span').textContent.replace('Form ', '') };
            
            if (type === 'default') {
                formData.tileNum = block.querySelector('.defaultTileNum')?.value || '';
                formData.fileName = block.querySelector('.defaultFileName')?.value || '';
            } else if (type === 'singleNest') {
                formData.nestQty = block.querySelector('.singleNestQty')?.value || '';
                formData.fileName = block.querySelector('.singleFileName')?.value || '';
            } else if (type === 'multiNest') {
                const multiForms = [];
                block.querySelectorAll('.multiFileName').forEach((input, i) => {
                    const nestAmount = block.querySelectorAll('.multiNestAmount')[i]?.value || '';
                    multiForms.push({ fileName: input.value, nestAmount });
                });
                formData.forms = multiForms;
            } else if (type === 'spectacular') {
                formData.fileName = block.querySelector('.specFileName')?.value || '';
                const tiles = [];
                block.querySelectorAll('.specTileCount').forEach(input => tiles.push(input.value));
                formData.tilesPerRow = tiles;
            }
            
            forms.push(formData);
        });
        
        let summaryHtml = `
            <div class="summary-item"><strong>Ripped by:</strong> ${rippedBy}</div>
            <div class="summary-item"><strong>Printer:</strong> ${printer}</div>
            <div class="summary-item"><strong>Color Match:</strong> ${colorMatch}</div>
            <div class="summary-item"><strong>File:</strong> ${fileInput.files[0].name}</div>
            <div class="summary-item"><strong>Forms:</strong> ${forms.length}</div>
        `;
        
        overlayTitle.textContent = 'Processing Your RIP List';
        summaryContent.innerHTML = summaryHtml;
        spinner.style.display = 'block';
        statusMessage.textContent = 'Waiting for RIP List...';
        downloadContainer.innerHTML = '';
        errorContainer.innerHTML = '';
        overlay.style.display = 'flex';
        
        const formDataPayload = new FormData();
        formDataPayload.append('rippedBy', rippedBy);
        formDataPayload.append('printer', printer);
        formDataPayload.append('colorMatch', colorMatch);
        formDataPayload.append('forms', JSON.stringify(forms));
        formDataPayload.append('jobTicketPdf', fileInput.files[0]);
        
        try {
            const response = await fetch(n8nWebhookUrl, {
                method: 'POST',
                body: formDataPayload
            });
            
            if (response.ok) {
                const data = await response.json();
                spinner.style.display = 'none';
                statusMessage.textContent = 'RIP List Ready!';
                
                let url = data.url;
                if (!url && Array.isArray(data) && data[0]) url = data[0].url;
                
                if (url) {
                    downloadContainer.innerHTML = `
                        <a href="${url}" target="_blank" class="download-link">📥 Download RIP List</a>
                        <p style="margin-top: 10px; font-size: 12px; color: #666;">Link expires in 1 hour</p>
                    `;
                } else {
                    downloadContainer.innerHTML = `<p>RIP List generated, but no URL returned.</p>`;
                }
            } else {
                throw new Error(`Server returned ${response.status}`);
            }
        } catch (error) {
            console.error('Error:', error);
            spinner.style.display = 'none';
            overlayTitle.textContent = 'Submission Failed';
            statusMessage.textContent = '';
            errorContainer.innerHTML = `
                <p>There was an error processing your request.</p>
                <p style="font-size: 12px;">${error.message}</p>
                <button onclick="document.getElementById('submissionOverlay').style.display='none'">Close</button>
            `;
        }
    });
    
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.style.display = 'none';
    });
</script>
</body>
</html>
