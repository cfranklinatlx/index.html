<!DOCTYPE html>
<html>
<head>
    <title>RIP List Form</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; margin-right: 10px; }
        
        .app-container { display: flex; gap: 20px; }
        .batch-drop-zone {
            width: 120px;
            border: 3px dashed #007bff;
            border-radius: 12px;
            background: #f0f7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px 10px;
            cursor: pointer;
            transition: background 0.2s;
            align-self: flex-start;
            margin-top: 20px;
        }
        .batch-drop-zone.drag-over { background: #d0e4ff; border-color: #0056b3; }
        .batch-drop-zone p { margin: 10px 0; font-weight: bold; color: #007bff; }
        .main-content { flex: 1; }
        
        .form-block { 
            border: 2px solid #ccc; 
            padding: 15px; 
            margin: 20px 0; 
            background: #f9f9f9; 
            border-radius: 5px;
            transition: border-color 0.2s;
            position: relative;
        }
        .form-block.drag-over { border-color: #007bff; border-style: dashed; background: #eef6ff; }
        .form-block h4 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .form-block h4 span { font-size: 1.5em; margin-right: 10px; }
        .remove-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .tile-row { margin-bottom: 8px; }
        .version-row { border-top: 1px dashed #ccc; padding-top: 15px; margin-top: 15px; }
        .version-row:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
        .button-group { margin: 20px 0; }
        hr { margin: 20px 0; }
        .drop-zone-left {
            position: absolute;
            left: -30px;
            top: 0;
            width: 20px;
            height: 100%;
            background: transparent;
            z-index: 10;
        }
        
        .pdf-upload-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .pdf-upload-row input {
            flex: 1;
        }
        .pdf-upload-row button {
            white-space: nowrap;
            margin: 0;
            padding: 8px 12px;
            font-size: 14px;
        }
        .btn-view {
            background-color: #28a745;
        }
        .btn-view:hover {
            background-color: #218838;
        }
        .btn-remove {
            background-color: #dc3545;
        }
        .btn-remove:hover {
            background-color: #c82333;
        }

        #typeSelectorModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 350px;
            width: 90%;
            text-align: center;
        }
        .modal-content h3 { margin-top: 0; }
        .modal-content select { margin: 20px 0; padding: 10px; }
        .modal-content button { margin: 5px; }

        #submissionOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .submission-card {
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .summary { text-align: left; margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .summary-item { margin: 8px 0; }
        .download-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .download-link:hover { background: #218838; }
        .error-message { color: #dc3545; margin-top: 15px; }
        
        .pdf-status {
            font-size: 12px;
            margin-top: 5px;
            color: #28a745;
        }
        .pdf-status.error {
            color: #dc3545;
        }
        
        /* Feedback Modal Styles */
        .feedback-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2001;
        }
        .feedback-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
        }
        .feedback-card button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-yes { background: #28a745; color: white; }
        .btn-no { background: #dc3545; color: white; }
    </style>
</head>
<body>

<h2>RIP List Form</h2>

<div class="app-container">
    <div id="batchDropZone" class="batch-drop-zone">
        <p>📁</p>
        <p>Drop PDFs here</p>
        <p style="font-size: 12px; color: #666;">Create multiple forms</p>
    </div>

    <div class="main-content">
        <div class="form-group">
            <label>Ripped by:</label>
            <input type="text" id="rippedBy">
        </div>
        <div class="form-group">
            <label>Printer:</label>
            <select id="printer">
                <option value="5R1">5R1</option>
                <option value="5R2">5R2</option>
                <option value="5R3">5R3</option>
                <option value="5R4">5R4</option>
                <option value="FabriVu">FabriVu</option>
                <option value="Kudu 1">Kudu 1</option>
                <option value="Kudu 2">Kudu 2</option>
                <option value="Kudu 3">Kudu 3</option>
            </select>
        </div>
        <div class="form-group">
            <label>Color Match:</label>
            <select id="colorMatch">
                <option value="Laser">Laser</option>
                <option value="Mini">Mini</option>
                <option value="Pleasing">Pleasing</option>
            </select>
        </div>

        <div class="form-group">
            <label>Job Ticket PDF:</label>
            <div class="pdf-upload-row">
                <input type="file" id="jobTicketPdf" accept=".pdf,application/pdf">
                <button type="button" id="viewJobTicketBtn" class="btn-view" style="display: none;">👁️ View Online</button>
                <button type="button" id="removePdfBtn" class="btn-remove" style="display: none;">✖️ Remove</button>
            </div>
            <div id="pdfStatus" class="pdf-status"></div>
        </div>

        <hr>

        <div id="formsContainer"></div>

        <div class="button-group">
            <button id="addAnotherFormBtn">➕ Add Empty Form</button>
        </div>

        <hr>

        <button id="submitBtn">Submit to n8n</button>
    </div>
</div>

<div id="typeSelectorModal">
    <div class="modal-content">
        <h3>Select Form Type</h3>
        <p>Choose the type for <span id="fileCount">0</span> new form(s):</p>
        <select id="batchTypeSelect">
            <option value="default" selected>Default</option>
            <option value="billboard">Billboard</option>
            <option value="spectacular">Vinyl Spectacular</option>
        </select>
        <br>
        <button id="confirmBatchType">Create Forms</button>
        <button id="cancelBatchType" style="background: #6c757d;">Cancel</button>
    </div>
</div>

<div id="submissionOverlay">
    <div class="submission-card">
        <h3 id="overlayTitle">Processing Your RIP List</h3>
        <div id="summaryContent" class="summary"></div>
        <div id="spinner" class="spinner"></div>
        <p id="statusMessage">Waiting for RIP List...</p>
        <div id="downloadContainer"></div>
        <div id="errorContainer" class="error-message"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const n8nWebhookUrl = 'https://cfranklinatlx.app.n8n.cloud/webhook/106d0183-5d4a-4655-abe7-5aa10c4fad59';
    const LITHO_USERNAME = 'vutek';
    const LITHO_PASSWORD = 'Trigger13';
    const FAILURE_EMAIL = 'cfranklin@lithographix.com';
    
    const currentHour = new Date().getHours();
    document.getElementById('rippedBy').value = (currentHour >= 6 && currentHour < 18) ? 'GH' : 'JD';
    
    let currentJobNumber = null;
    let currentPdfFile = null;
    let lastFormDataForEmail = null;
    
    const animalEmojis = ['🐶', '🐱', '🦊', '🐻', '🐼', '🐨', '🦁', '🐮', '🐷', '🐸', '🐧', '🦉', '🦄', '🐙', '🦋'];
    const usedEmojis = new Set();
    
    function getRandomEmoji() {
        const available = animalEmojis.filter(e => !usedEmojis.has(e));
        if (available.length === 0) {
            usedEmojis.clear();
            return animalEmojis[0];
        }
        const emoji = available[Math.floor(Math.random() * available.length)];
        usedEmojis.add(emoji);
        return emoji;
    }
    
    function releaseEmoji(emoji) {
        usedEmojis.delete(emoji);
    }
    
    const formsContainer = document.getElementById('formsContainer');
    let pendingBatchFiles = [];
    
    const modal = document.getElementById('typeSelectorModal');
    const fileCountSpan = document.getElementById('fileCount');
    const batchTypeSelect = document.getElementById('batchTypeSelect');
    
    function cleanFileName(fileName) {
        return fileName.replace(/\.pdf$/i, '');
    }
    
    function extractJobNumber(fileName) {
        const match = fileName.match(/^(\d{6})/);
        return match ? match[1] : null;
    }
    
    async function fetchJobTicketPDF(jobNumber) {
        const url = `https://webapps.lithographix.com/jt/jobticket.pdf?JobNo=${jobNumber}`;
        const authString = btoa(`${LITHO_USERNAME}:${LITHO_PASSWORD}`);
        
        const response = await fetch(url, {
            headers: { 
                'Authorization': 'Basic ' + authString
            }
        });
        
        if (!response.ok) {
            throw new Error(`Failed to fetch job ticket: ${response.status}`);
        }
        
        return await response.arrayBuffer();
    }
    
    async function autoFetchAndSetPdf(jobNumber) {
        const pdfStatus = document.getElementById('pdfStatus');
        const viewBtn = document.getElementById('viewJobTicketBtn');
        const removeBtn = document.getElementById('removePdfBtn');
        const fileInput = document.getElementById('jobTicketPdf');
        
        try {
            pdfStatus.textContent = '⏳ Fetching job ticket from Lithographix...';
            pdfStatus.className = 'pdf-status';
            
            const pdfBytes = await fetchJobTicketPDF(jobNumber);
            const pdfFile = new File([pdfBytes], `${jobNumber}_JobTicket.pdf`, { type: 'application/pdf' });
            
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(pdfFile);
            fileInput.files = dataTransfer.files;
            currentPdfFile = pdfFile;
            currentJobNumber = jobNumber;
            
            pdfStatus.textContent = '✅ Job ticket auto-loaded from Lithographix';
            pdfStatus.className = 'pdf-status';
            viewBtn.style.display = 'inline-block';
            removeBtn.style.display = 'inline-block';
            
        } catch (error) {
            console.error('Auto-fetch error:', error);
            pdfStatus.textContent = `⚠️ Could not auto-fetch: ${error.message}`;
            pdfStatus.className = 'pdf-status error';
            viewBtn.style.display = 'none';
        }
    }
    
    function updatePdfButtons() {
        const fileInput = document.getElementById('jobTicketPdf');
        const viewBtn = document.getElementById('viewJobTicketBtn');
        const removeBtn = document.getElementById('removePdfBtn');
        const pdfStatus = document.getElementById('pdfStatus');
        
        if (fileInput.files.length > 0 && currentJobNumber) {
            viewBtn.style.display = 'inline-block';
            removeBtn.style.display = 'inline-block';
        } else {
            viewBtn.style.display = 'none';
            removeBtn.style.display = 'none';
            currentJobNumber = null;
            currentPdfFile = null;
            if (fileInput.files.length === 0) {
                pdfStatus.textContent = '';
            }
        }
    }
    
    document.getElementById('viewJobTicketBtn').addEventListener('click', () => {
        if (currentJobNumber) {
            const url = `https://webapps.lithographix.com/jt/jobticket.pdf?JobNo=${currentJobNumber}`;
            window.open(url, '_blank');
        } else {
            alert('No job number available. Please drop a file first.');
        }
    });
    
    document.getElementById('removePdfBtn').addEventListener('click', () => {
        const fileInput = document.getElementById('jobTicketPdf');
        fileInput.value = '';
        currentJobNumber = null;
        currentPdfFile = null;
        updatePdfButtons();
        document.getElementById('pdfStatus').textContent = '📄 PDF removed';
        document.getElementById('pdfStatus').className = 'pdf-status';
    });
    
    document.getElementById('jobTicketPdf').addEventListener('change', () => {
        if (document.getElementById('jobTicketPdf').files.length === 0) {
            currentJobNumber = null;
            currentPdfFile = null;
        }
        updatePdfButtons();
    });
    
    function createFormBlock(formType = 'default') {
        const blockId = `formBlock_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
        const blockDiv = document.createElement('div');
        blockDiv.className = 'form-block';
        blockDiv.id = blockId;
        
        const formEmoji = getRandomEmoji();
        blockDiv.setAttribute('data-emoji', formEmoji);
        
        const leftDropZone = document.createElement('div');
        leftDropZone.className = 'drop-zone-left';
        leftDropZone.addEventListener('dragover', (e) => {
            e.preventDefault(); e.stopPropagation();
        });
        leftDropZone.addEventListener('drop', (e) => {
            e.preventDefault(); e.stopPropagation();
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length === 0) return;
            files.forEach(file => {
                const newBlock = createFormBlock('default');
                populateFormBlockWithFiles(newBlock, [file]);
            });
        });
        blockDiv.appendChild(leftDropZone);
        
        blockDiv.addEventListener('dragover', (e) => {
            e.preventDefault(); e.stopPropagation();
            blockDiv.classList.add('drag-over');
        });
        blockDiv.addEventListener('dragleave', () => blockDiv.classList.remove('drag-over'));
        blockDiv.addEventListener('drop', (e) => {
            e.preventDefault(); e.stopPropagation();
            blockDiv.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length === 0) return;
            populateFormBlockWithFiles(blockDiv, files);
        });
        
        const headerHtml = `
            <h4>
                <span>${formEmoji}</span>
                <button class="remove-btn" onclick="removeFormBlock('${blockId}', '${formEmoji}')">Remove</button>
            </h4>
            <div class="form-group">
                <label>Form Type:</label>
                <select class="formTypeSelect" data-block-id="${blockId}">
                    <option value="">-- Select --</option>
                    <option value="default" ${formType === 'default' ? 'selected' : ''}>Default</option>
                    <option value="billboard" ${formType === 'billboard' ? 'selected' : ''}>Billboard</option>
                    <option value="spectacular" ${formType === 'spectacular' ? 'selected' : ''}>Vinyl Spectacular</option>
                </select>
            </div>
            <div class="dynamicFieldsArea" id="fields_${blockId}"></div>
        `;
        blockDiv.insertAdjacentHTML('beforeend', headerHtml);
        formsContainer.appendChild(blockDiv);
        
        const typeSelect = blockDiv.querySelector('.formTypeSelect');
        const fieldsArea = document.getElementById(`fields_${blockId}`);
        
        function generateFields(type) {
            let html = '';
            if (type === 'default' || type === 'billboard') {
                html = `
                    <label>Version Quantity:</label> <input type="number" class="versionQty" min="1" value="1"><br><br>
                    <div class="versionContainer"></div>
                `;
            } else if (type === 'spectacular') {
                html = `
                    <label>Version Quantity:</label> <input type="number" class="versionQty" min="1" value="1"><br><br>
                    <div class="versionContainer"></div>
                `;
            }
            fieldsArea.innerHTML = html;
            
            if (type === 'default' || type === 'billboard') {
                const container = blockDiv.querySelector('.versionContainer');
                const qtyInput = blockDiv.querySelector('.versionQty');
                function updateVersionFields() {
                    const qty = parseInt(qtyInput.value) || 1;
                    let fieldsHtml = '';
                    for (let i = 1; i <= qty; i++) {
                        fieldsHtml += `<div class="version-row">`;
                        fieldsHtml += `<label>File Name #${i}:</label> <input type="text" class="defaultFileName" data-index="${i}" placeholder="e.g., my_file"><br>`;
                        fieldsHtml += `</div>`;
                    }
                    container.innerHTML = fieldsHtml;
                }
                qtyInput.addEventListener('input', updateVersionFields);
                updateVersionFields();
            } else if (type === 'spectacular') {
                const container = blockDiv.querySelector('.versionContainer');
                const qtyInput = blockDiv.querySelector('.versionQty');
                
                function updateVersionFields() {
                    const qty = parseInt(qtyInput.value) || 1;
                    let fieldsHtml = '';
                    for (let i = 1; i <= qty; i++) {
                        fieldsHtml += `<div class="version-row">`;
                        fieldsHtml += `<label>File Name #${i}:</label> <input type="text" class="specFileName" data-index="${i}"><br>`;
                        fieldsHtml += `<label>Row Count #${i}:</label> <input type="number" class="specRowCount" data-index="${i}" min="1" value="1"><br>`;
                        fieldsHtml += `<div class="specRowContainer_${i}"></div>`;
                        fieldsHtml += `</div>`;
                    }
                    container.innerHTML = fieldsHtml;
                    
                    for (let i = 1; i <= qty; i++) {
                        const rowContainer = container.querySelector(`.specRowContainer_${i}`);
                        const rowCountInput = container.querySelector(`.specRowCount[data-index="${i}"]`);
                        
                        function updateSpecRows() {
                            const rows = parseInt(rowCountInput.value) || 1;
                            let rowsHtml = '';
                            for (let r = 1; r <= rows; r++) {
                                rowsHtml += `<div class="tile-row">`;
                                rowsHtml += `<label># of tiles in Row ${r}:</label> <input type="text" class="specTileCount" data-version="${i}" data-row="${r}" placeholder="e.g., 5"><br>`;
                                rowsHtml += `</div>`;
                            }
                            rowContainer.innerHTML = rowsHtml;
                            
                            const tileInputs = rowContainer.querySelectorAll('.specTileCount');
                            if (tileInputs.length > 0) {
                                tileInputs[0].addEventListener('input', function(e) {
                                    const firstVal = e.target.value;
                                    for (let j = 1; j < tileInputs.length; j++) {
                                        tileInputs[j].value = firstVal;
                                    }
                                });
                            }
                        }
                        
                        rowCountInput.addEventListener('input', updateSpecRows);
                        updateSpecRows();
                    }
                }
                
                qtyInput.addEventListener('input', updateVersionFields);
                updateVersionFields();
            }
        }
        
        generateFields(formType);
        typeSelect.addEventListener('change', (e) => generateFields(e.target.value));
        return blockDiv;
    }
    
    function populateFormBlockWithFiles(block, files) {
        const typeSelect = block.querySelector('.formTypeSelect');
        const type = typeSelect.value;
        const fileNames = files.map(f => cleanFileName(f.name));
        
        const qtyInput = block.querySelector('.versionQty');
        if (qtyInput) {
            qtyInput.value = files.length;
            qtyInput.dispatchEvent(new Event('input'));
            setTimeout(() => {
                let fileNameInputs;
                if (type === 'default' || type === 'billboard') fileNameInputs = block.querySelectorAll('.defaultFileName');
                else if (type === 'spectacular') fileNameInputs = block.querySelectorAll('.specFileName');
                
                if (fileNameInputs) {
                    files.forEach((file, i) => {
                        if (fileNameInputs[i]) {
                            fileNameInputs[i].value = cleanFileName(file.name);
                        }
                    });
                }
                
                // Auto-fetch PDF from Lithographix using the first file's job number
                const firstFileName = files[0].name;
                const jobNumber = extractJobNumber(firstFileName);
                if (jobNumber && !currentJobNumber) {
                    autoFetchAndSetPdf(jobNumber);
                }
            }, 50);
        }
    }
    
    window.removeFormBlock = function(blockId, emoji) {
        const block = document.getElementById(blockId);
        if (block) {
            releaseEmoji(emoji);
            block.remove();
        }
    };
    
    createFormBlock('default');
    document.getElementById('addAnotherFormBtn').addEventListener('click', () => createFormBlock('default'));
    
    const batchZone = document.getElementById('batchDropZone');
    batchZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        batchZone.classList.add('drag-over');
    });
    batchZone.addEventListener('dragleave', () => batchZone.classList.remove('drag-over'));
    batchZone.addEventListener('drop', (e) => {
        e.preventDefault();
        batchZone.classList.remove('drag-over');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
        if (files.length === 0) return;
        
        pendingBatchFiles = files;
        fileCountSpan.textContent = files.length;
        modal.style.display = 'flex';
    });
    
    document.getElementById('confirmBatchType').addEventListener('click', () => {
        const selectedType = batchTypeSelect.value;
        pendingBatchFiles.forEach(file => {
            const newBlock = createFormBlock(selectedType);
            populateFormBlockWithFiles(newBlock, [file]);
        });
        modal.style.display = 'none';
        pendingBatchFiles = [];
    });
    
    document.getElementById('cancelBatchType').addEventListener('click', () => {
        modal.style.display = 'none';
        pendingBatchFiles = [];
    });
    
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });
    
    const overlay = document.getElementById('submissionOverlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const summaryContent = document.getElementById('summaryContent');
    const spinner = document.getElementById('spinner');
    const statusMessage = document.getElementById('statusMessage');
    const downloadContainer = document.getElementById('downloadContainer');
    const errorContainer = document.getElementById('errorContainer');

    // Function to send failure email via mailto
    function sendFailureEmail(summaryText, timestamp, formData) {
        const subject = encodeURIComponent('Fail');
        const body = encodeURIComponent(
            `=== RIP LIST FAILURE REPORT ===\n\n` +
            `Timestamp: ${timestamp}\n\n` +
            `=== FORM DATA ===\n` +
            `Ripped By: ${formData.rippedBy}\n` +
            `Printer: ${formData.printer}\n` +
            `Color Match: ${formData.colorMatch}\n` +
            `Job Number: ${formData.jobNumber || 'N/A'}\n\n` +
            `=== FORMS SUBMITTED ===\n${JSON.stringify(formData.forms, null, 2)}\n\n` +
            `=== GENERATED SUMMARY ===\n${summaryText}\n\n` +
            `=== USER ACTION ===\nUser reported the RIP list did not work as expected.`
        );
        window.location.href = `mailto:${FAILURE_EMAIL}?subject=${subject}&body=${body}`;
    }
    
    // Function to show feedback dialog
    function showFeedbackDialog(summaryText, timestamp, formData) {
        const existingModal = document.getElementById('feedbackModal');
        if (existingModal) existingModal.remove();
        
        const modalDiv = document.createElement('div');
        modalDiv.id = 'feedbackModal';
        modalDiv.className = 'feedback-modal';
        modalDiv.innerHTML = `
            <div class="feedback-card">
                <h3>✅ RIP List Generated</h3>
                <p>Did the PDF open correctly?</p>
                <button id="feedbackYes" class="btn-yes">Yes, it worked</button>
                <button id="feedbackNo" class="btn-no">No, something went wrong</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        document.getElementById('feedbackYes').addEventListener('click', () => {
            modalDiv.remove();
        });
        
        document.getElementById('feedbackNo').addEventListener('click', () => {
            modalDiv.remove();
            sendFailureEmail(summaryText, timestamp, formData);
            alert('Failure report sent. Thank you for your feedback.');
        });
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const rippedBy = document.getElementById('rippedBy').value;
        const printer = document.getElementById('printer').value;
        const colorMatch = document.getElementById('colorMatch').value;
        const fileInput = document.getElementById('jobTicketPdf');
        
        if (!fileInput.files.length) {
            alert('Please select a PDF file to upload.');
            return;
        }
        
        const forms = [];
        document.querySelectorAll('.form-block').forEach((block, index) => {
            const typeSelect = block.querySelector('.formTypeSelect');
            const type = typeSelect.value;
            const formEmoji = block.querySelector('h4 span').textContent;
            const formData = { type, order: index + 1, formIdentifier: formEmoji };
            
            if (type === 'default' || type === 'billboard') {
                const versions = [];
                block.querySelectorAll('.defaultFileName').forEach((input, i) => {
                    versions.push({ fileName: input.value, tileNum: '' });
                });
                formData.versions = versions;
            } else if (type === 'spectacular') {
                const versions = [];
                block.querySelectorAll('.specFileName').forEach((input, versionIdx) => {
                    const tiles = [];
                    const tileInputs = block.querySelectorAll(`.specTileCount[data-version="${versionIdx + 1}"]`);
                    tileInputs.forEach(t => tiles.push(t.value));
                    versions.push({ fileName: input.value, tilesPerRow: tiles });
                });
                formData.versions = versions;
            }
            forms.push(formData);
        });
        
        // Store form data for potential failure email
        const jobNumber = currentJobNumber || (forms[0]?.versions[0]?.fileName?.match(/^(\d{6})/)?.[1] || 'Unknown');
        const formDataForEmail = {
            rippedBy,
            printer,
            colorMatch,
            jobNumber,
            forms
        };
        lastFormDataForEmail = formDataForEmail;
        
        overlayTitle.textContent = 'Processing Your RIP List';
        summaryContent.innerHTML = `
            <div class="summary-item"><strong>Ripped by:</strong> ${rippedBy}</div>
            <div class="summary-item"><strong>Printer:</strong> ${printer}</div>
            <div class="summary-item"><strong>Color Match:</strong> ${colorMatch}</div>
            <div class="summary-item"><strong>File:</strong> ${fileInput.files[0].name}</div>
            <div class="summary-item"><strong>Forms:</strong> ${forms.length}</div>
        `;
        spinner.style.display = 'block';
        statusMessage.textContent = 'Waiting for RIP List...';
        downloadContainer.innerHTML = '';
        errorContainer.innerHTML = '';
        overlay.style.display = 'flex';
        
        const formDataPayload = new FormData();
        formDataPayload.append('rippedBy', rippedBy);
        formDataPayload.append('printer', printer);
        formDataPayload.append('colorMatch', colorMatch);
        formDataPayload.append('forms', JSON.stringify(forms));
        formDataPayload.append('jobTicketPdf', fileInput.files[0]);
        
        try {
            const response = await fetch(n8nWebhookUrl, { method: 'POST', body: formDataPayload });
            if (response.ok) {
                const data = await response.json();
                spinner.style.display = 'none';
                statusMessage.textContent = 'RIP List Ready!';
                let url = data.url;
                if (!url && Array.isArray(data) && data[0]) url = data[0].url;
                if (url) {
                    downloadContainer.innerHTML = `<a href="${url}" target="_blank" class="download-link">📥 Download RIP List</a><p style="margin-top: 10px; font-size: 12px; color: #666;">Link expires in 1 hour</p>`;
                    
                    // Open PDF in new window
                    window.open(url, '_blank');
                    
                    // Get summary text and show feedback dialog
                    const summaryText = summaryContent.innerText;
                    const timestamp = new Date().toLocaleString();
                    setTimeout(() => {
                        showFeedbackDialog(summaryText, timestamp, formDataForEmail);
                    }, 1000);
                    
                } else {
                    downloadContainer.innerHTML = `<p>RIP List generated, but no URL returned.</p>`;
                }
            } else throw new Error(`Server returned ${response.status}`);
        } catch (error) {
            console.error('Error:', error);
            spinner.style.display = 'none';
            overlayTitle.textContent = 'Submission Failed';
            statusMessage.textContent = '';
            errorContainer.innerHTML = `<p>There was an error processing your request.</p><p style="font-size: 12px;">${error.message}</p><button onclick="document.getElementById('submissionOverlay').style.display='none'">Close</button>`;
        }
    });
    
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });
    document.body.addEventListener('dragover', (e) => e.preventDefault());
    document.body.addEventListener('drop', (e) => e.preventDefault());
</script>
</body>
</html>
